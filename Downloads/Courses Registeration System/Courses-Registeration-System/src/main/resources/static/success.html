<!DOCTYPE html>
<html lang="en">
<head>
    <title>Success</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #00b09b, #96c93d);
            text-align: center;
            color: white;
        }

        .box {
            margin-top: 150px;
        }

        h1 {
            font-size: 40px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: lightgray;
        }
    </style>
</head>

<body>
<div class="box">
<h1>🎉 Registration Successful!</h1>
<p id="message"></p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const Name = params.get("name");
    const Course = params.get("course");
    console.log(Name, Course);
    document.getElementById("message").innerText =
        Name + ", you have successfully enrolled in " + Course;
</script>

</body>
</html>
